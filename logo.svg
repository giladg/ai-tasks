<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect x="0" y="0" width="200" height="200" fill="#FAFAFA"/>
  
  <!-- Main geometric composition -->
  <g transform="translate(100, 100)">
    <!-- Large circle base -->
    <circle cx="0" cy="0" r="60" fill="#4F46E5"/>
    
    <!-- Overlapping shape - rounded square -->
    <rect x="-25" y="-25" width="50" height="50" rx="8" fill="#10B981" opacity="0.9"/>
    
    <!-- Small accent circle -->
    <circle cx="28" cy="-28" r="16" fill="#A78BFA"/>
  </g>
</svg>